<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>POZi — Load Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#07070f;color:#fff;min-height:100vh;padding:0}

/* HEADER */
.header{padding:32px 24px 24px;text-align:center;border-bottom:1px solid #1a1a2e}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-1px;margin-bottom:4px}
.logo-i{color:#00c96e}
.tagline{font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase}

/* MAIN */
.main{padding:24px;max-width:500px;margin:0 auto}

/* STATUS CARD */
.status-card{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:20px;padding:28px;text-align:center;margin-bottom:20px}
.big-num{font-family:'Syne',sans-serif;font-weight:800;font-size:64px;color:#00c96e;line-height:1}
.big-label{font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-top:4px;margin-bottom:20px}
.progress-track{background:#1a1a2e;border-radius:20px;height:6px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#00c96e,#0055ff);border-radius:20px;width:0%;transition:width 0.4s ease}
.status-msg{font-size:13px;color:#555;height:18px}

/* LOAD BUTTON */
.load-btn{width:100%;background:linear-gradient(135deg,#00c96e,#009950);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;padding:18px;border-radius:14px;border:none;cursor:pointer;margin-bottom:20px;transition:all 0.2s;letter-spacing:0.5px}
.load-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,201,110,0.3)}
.load-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.load-btn.done{background:linear-gradient(135deg,#00c96e,#0055ff)}

/* STORE CARDS */
.stores-title{font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.store-card{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all 0.3s}
.store-card.loaded{border-color:#00c96e30;background:#00c96e06}
.store-card.loading{border-color:#00c96e60;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{border-color:#00c96e40}50%{border-color:#00c96e90}}
.store-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#1a1a2e}
.store-info{flex:1}
.store-name{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;margin-bottom:2px}
.store-loc{font-size:11px;color:#444}
.store-count{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#333;text-align:right}
.store-count.done{color:#00c96e}
.check{width:22px;height:22px;border-radius:50%;background:#00c96e;display:none;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.store-card.loaded .check{display:flex}

/* PRODUCT PILLS - pop in as they load */
.products-wrap{margin-top:16px}
.products-title{font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:20px;padding:5px 12px;font-size:10px;color:#444;opacity:0;transform:scale(0.8);transition:all 0.3s;font-family:'Syne',sans-serif;font-weight:700}
.pill.popped{opacity:1;transform:scale(1)}
.pill.ok{background:#00c96e10;border-color:#00c96e25;color:#00c96e}
.pill.err{background:#ff335510;border-color:#ff335525;color:#ff3355}

/* ERROR BOX */
.error-box{background:#ff335510;border:1px solid #ff335530;border-radius:12px;padding:14px;margin-top:12px;font-size:12px;color:#ff3355;display:none;font-family:monospace}
</style>
</head>

var loaded=0;
var errors=0;

var storeMap={
  'Hills Flat Lumber_Grass Valley CA': 'hfgv',
  'Hills Flat Lumber_Colfax CA': 'hfcf',
  'A to Z Supply_Grass Valley CA': 'atz',
  'B&C Ace Hardware_Grass Valley CA': 'bnc'
};
var storeCounts={'hfgv':0,'hfcf':0,'atz':0,'bnc':0};
var storeMax={'hfgv':40,'hfcf':24,'atz':45,'bnc':46};

function setLoading(storeKey){
  var card=document.getElementById('card-'+storeKey);
  if(card)card.classList.add('loading');
}
function setLoaded(storeKey){
  var card=document.getElementById('card-'+storeKey);
  if(card){card.classList.remove('loading');card.classList.add('loaded');}
}
function addPill(name, ok){
  var pills=document.getElementById('pills');
  var p=document.createElement('div');
  p.className='pill '+(ok?'ok':'err');
  p.textContent=name.length>22?name.substring(0,20)+'…':name;
  pills.appendChild(p);
  setTimeout(function(){p.classList.add('popped');},30);
  pills.scrollTop=pills.scrollHeight;
}
function updateNum(){
  document.getElementById('bigNum').textContent=loaded;
  document.getElementById('fill').style.width=Math.round((loaded/records.length)*100)+'%';
  document.getElementById('statusMsg').textContent='Loading... '+loaded+' of '+records.length;
}
function showError(msg){
  var box=document.getElementById('errBox');
  box.style.display='block';
  box.textContent='Error: '+msg;
}

var idx=0;
function loadNext(){
  if(idx>=records.length){
    document.getElementById('statusMsg').textContent='✅ Done! '+loaded+' loaded'+(errors?' ('+errors+' errors)':'');
    document.getElementById('loadBtn').textContent='✅ Inventory Live in Supabase!';
    document.getElementById('loadBtn').classList.add('done');
    document.getElementById('loadBtn').disabled=false;
    // Mark all stores done
    Object.keys(storeCounts).forEach(function(k){setLoaded(k);});
    return;
  }
  
  var rec=records[idx];
  var sk=storeMap[rec.store_name+'_'+rec.store_location]||'bnc';
  setLoading(sk);

  var xhr=new XMLHttpRequest();
  xhr.open('POST',URL,true);
  xhr.setRequestHeader('apikey',KEY);
  xhr.setRequestHeader('Authorization','Bearer '+KEY);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Prefer','return=minimal');
  xhr.timeout=8000;
  
  xhr.onload=function(){
    var ok=(xhr.status===201||xhr.status===200||xhr.status===204);
    if(ok){
      loaded++;
      storeCounts[sk]++;
      var cnt=document.getElementById('cnt-'+sk);
      if(cnt){cnt.textContent=storeCounts[sk]+' loaded';cnt.className='store-count done';}
      if(storeCounts[sk]>=storeMax[sk])setLoaded(sk);
    } else {
      errors++;
      showError(xhr.status+' — '+xhr.responseText.substring(0,120));
    }
    addPill(rec.product_name, ok);
    updateNum();
    idx++;
    setTimeout(loadNext, ok?60:300);
  };
  xhr.ontimeout=function(){
    errors++;
    addPill(rec.product_name,false);
    idx++;
    setTimeout(loadNext,300);
  };
  xhr.onerror=function(){
    errors++;
    showError('Network error — check connection');
    addPill(rec.product_name,false);
    idx++;
    setTimeout(loadNext,500);
  };
  xhr.send(JSON.stringify(rec));
}

function startLoad(){
  document.getElementById('loadBtn').disabled=true;
  document.getElementById('loadBtn').textContent='Loading...';
  idx=0;loaded=0;errors=0;
  document.getElementById('errBox').style.display='none';
  document.getElementById('pills').innerHTML='';
  loadNext();
}
</script>
